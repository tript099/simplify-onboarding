# Silent-SSO mode: run the onboarding service ON DocFlow's network, sharing its
# Redis (sessions) and Postgres. The onboarding portal then writes the central
# session into the SAME Redis DocFlow reads — so signing in on the portal logs you
# into DocFlow with NO second login and NO DocFlow code change.
#
# Prereqs: the DocFlow stack is already running (`docker compose up -d` in repo
# root) so the `redis` + `pgbouncer` services and the network exist.
#
#   docker compose -f docker-compose.sso.yml --env-file ../../.env up -d --build
#
# Then run the onboarding frontend (npm run dev on :3100) and DocFlow (:3000).
# Sign in on the portal → open DocFlow → already logged in. Logout on the portal
# → DocFlow session gone (shared, persist-until-logout).
services:
  onboarding:
    build: .
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      APP_ENV: development
      PORT: "8090"

      # Identity → the same Zitadel DocFlow uses.
      IDENTITY_PROVIDER: zitadel
      ZITADEL_ISSUER: ${ZITADEL_ISSUER}
      ZITADEL_INTERNAL_URL: ${ZITADEL_INTERNAL_URL:-${ZITADEL_ISSUER}}
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID}
      ZITADEL_SERVICE_PAT: ${ZITADEL_SERVICE_PAT}
      ZITADEL_ORG_ID: ${ZITADEL_ORG_ID}

      # SHARED session store + directory — the heart of silent SSO.
      REDIS_URL: redis://redis:6379 # DocFlow's Redis (service name on its network)
      REDIS_DB: "1" # DocFlow sessions live in DB1
      DATABASE_URL: ${DATABASE_URL} # shared platform DB → DocFlow-schema sessions
      SESSION_PERSIST: "true" # session lives until logout

      # Local: cookie is host-only for `localhost`, shared across :3100/:3000.
      # Production: set COOKIE_DOMAIN=.simplifyaipro.com so all subdomains share it.
      COOKIE_SECURE: "false"
      # COOKIE_DOMAIN: .simplifyaipro.com

      FRONTEND_URL: http://localhost:3100
      CORS_ALLOWED_ORIGINS: http://localhost:3100,http://localhost:3000
      SIMPLIFYCORE_STUB: "true"
    networks:
      - docflow

networks:
  docflow:
    external: true
    # The network DocFlow's compose created. Default project name for the
    # "DocFlow AWS" folder is `docflowaws`; override with DOCFLOW_NETWORK if yours
    # differs (check: `docker network ls | grep internal`).
    name: ${DOCFLOW_NETWORK:-docflowaws_internal}
