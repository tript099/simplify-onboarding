# Standalone onboarding service. Config lives in this folder's `.env` (copy from
# `.env.example`). It depends only on Zitadel (the shared IdP) + its OWN Redis +
# its OWN Postgres (both defined below). MailForge + the scheduler are shared infra
# reached over HTTP. Products validate the central session via /auth/validate.
#
# Run (from this folder):
#   docker compose up -d --build
#   docker compose logs -f onboarding
#   docker compose down
#
# Cross-network by design: this service is NEVER on a shared Docker network with
# DocFlow (or any other Simplify product). It publishes port 8090 on the host and
# is reached over HTTP — products set ONBOARDING_VALIDATE_URL to its public URL
# (deployed) or http://host.docker.internal:8090/auth/validate (same host, local).
services:
  onboarding:
    build: .
    restart: unless-stopped
    ports:
      - "8090:8090"
    # All runtime config — secrets included — comes from this service's own .env.
    env_file:
      - .env
    volumes:
      # Team-notify recipients — bind-mounted so edits apply live (no rebuild).
      - ./config/demo-recipients.json:/app/config/demo-recipients.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway" # reach MailForge on the host
    depends_on:
      onboarding-db:
        condition: service_healthy
      onboarding-redis:
        condition: service_started
    networks:
      - onbnet

  # The onboarding service's dedicated session store (sessions, OTP, visitor state).
  onboarding-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - onbnet

  # The onboarding service's dedicated database.
  onboarding-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: onboarding
      POSTGRES_PASSWORD: onboarding
      POSTGRES_DB: onboarding
    ports:
      - "5440:5432" # host access for inspection (psql -h localhost -p 5440)
    volumes:
      - onboarding_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onboarding -d onboarding"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - onbnet

volumes:
  onboarding_db_data:

networks:
  # Onboarding runs on its OWN isolated network only. Products reach it over HTTP
  # (host-published :8090 / public URL), never by joining this network.
  onbnet:
    driver: bridge
